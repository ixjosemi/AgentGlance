name: Bug report
description: Report a reproducible AgentGlance problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Use the private Security Advisory flow.
  - type: input
    id: version
    attributes:
      label: AgentGlance version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: macOS, Mac, terminal, and agent tool versions
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
