name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Show toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift run agentglance-tests
      - name: Test OpenCode plugin
        run: node Tests/OpenCodePlugin/agentglance_test.mjs
      - name: Validate resources
        run: |
          plutil -lint config/Info.plist
          for script in scripts/*.sh Sources/AgentGlanceCore/Resources/hooks/*.sh; do /bin/sh -n "$script"; done
          node --input-type=module --check < Sources/AgentGlanceCore/Resources/opencode/agentglance.js
      - name: Package local app
        run: ./scripts/build-app.sh
      - name: Verify bundle
        run: |
          codesign --verify --deep --strict .build/AgentGlance.app
          test -x .build/AgentGlance.app/Contents/MacOS/AgentGlance
          test -x .build/AgentGlance.app/Contents/Resources/bin/agentglance
